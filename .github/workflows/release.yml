name: Release

# 打 v* tag 时:先创建该 tag 的 GitHub Release,再交叉编译静态 musl 二进制并上传。
# (推 tag 不会自动建 Release;upload-rust-binary-action 找不到 Release 会一直 "release not found")
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: 创建 Release(幂等,已存在则跳过)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                 --title "$GITHUB_REF_NAME" --notes "ipano $GITHUB_REF_NAME — 详见 CHANGELOG.md"

  upload:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # 某个架构挂了不影响其它架构照常发布
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v5
      # 为目标架构准备交叉工具链(含 ring 编译所需的 C 编译器)
      - uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      # 编译 + strip + 打包(ipano-<target>.tar.gz)+ sha256,上传到本 tag 的 Release
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ipano
          target: ${{ matrix.target }}
          archive: ipano-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
